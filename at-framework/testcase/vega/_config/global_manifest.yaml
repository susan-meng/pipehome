# 全局变量清单 - 供智能体提取：有哪些变量、如何引用
# 与 global.yaml 一一对应；case 中仅可使用此处列出的 name，引用方式为 ${name}
# 可由脚本从 global.yaml 的 key 自动生成骨架，description 可后续补全

variables:
  - name: buildin_catalog_id
    description: 内置数据源目录 ID
    ref: "${buildin_catalog_id}"
  - name: mysql_host
    description: MySQL 主机
    ref: "${mysql_host}"
  - name: mysql_port
    description: MySQL 端口
    ref: "${mysql_port}"
  - name: mysql_user
    description: MySQL 用户
    ref: "${mysql_user}"
  - name: mysql_password
    description: MySQL 密码（密文）
    ref: "${mysql_password}"
  - name: mysql_password_error
    description: MySQL 错误密码（用于负向用例）
    ref: "${mysql_password_error}"
  - name: mysql_password_plaintext
    description: MySQL 明文密码说明
    ref: "${mysql_password_plaintext}"
  - name: mysql_db_1
  - name: mysql_db_2
  - name: oracle_host
  - name: oracle_port
  - name: oracle_user
  - name: oracle_password
  - name: oracle_password_error
  - name: oracle_password_plaintext
  - name: oracle_db
  - name: oracle_schema_1
  - name: oracle_schema_2
  - name: postgres_host
  - name: postgres_port
  - name: postgres_user
  - name: postgres_password
  - name: postgres_password_error
  - name: postgres_password_plaintext
  - name: postgres_schema
  - name: postgres_db_1
  - name: postgres_db_2
  - name: inceptor_host
  - name: inceptor_port
  - name: inceptor_token
  - name: inceptor_token_error
  - name: inceptor_db_1
  - name: inceptor_db_2
  - name: opensearch_host
  - name: opensearch_port
  - name: opensearch_user
  - name: opensearch_password
  - name: opensearch_password_error
  - name: opensearch_password_plaintext
  - name: clickhouse_host
  - name: clickhouse_port
  - name: clickhouse_user
  - name: clickhouse_password
  - name: clickhouse_password_error
  - name: clickhouse_password_plaintext
  - name: clickhouse_db_1
  - name: clickhouse_db_2
  - name: mariadb_host
  - name: mariadb_port
  - name: mariadb_user
  - name: mariadb_password
  - name: mariadb_password_error
  - name: mariadb_password_plaintext
  - name: mariadb_db_1
  - name: mariadb_db_2
  - name: bin_data_template_mysql
    description: MySQL 数据源连接 JSON 模板，用于 body_params
    ref: "${bin_data_template_mysql}"
    used_in: [body_params]
  - name: bin_data_template_oracle
    description: Oracle 数据源连接 JSON 模板
    ref: "${bin_data_template_oracle}"
    used_in: [body_params]
  - name: bin_data_template_postgres
    description: Postgres 数据源连接 JSON 模板
    ref: "${bin_data_template_postgres}"
    used_in: [body_params]
  - name: bin_data_template_inceptor
    description: Inceptor 数据源连接 JSON 模板
    ref: "${bin_data_template_inceptor}"
    used_in: [body_params]
  - name: bin_data_template_opensearch
    description: OpenSearch 数据源连接 JSON 模板
    ref: "${bin_data_template_opensearch}"
    used_in: [body_params]
  - name: bin_data_template_clickhouse
    description: Clickhouse 数据源连接 JSON 模板
    ref: "${bin_data_template_clickhouse}"
    used_in: [body_params]
  - name: bin_data_template_mariadb
    description: MariaDB 数据源连接 JSON 模板
    ref: "${bin_data_template_mariadb}"
    used_in: [body_params]
  - name: bin_data_template_4
  - name: bin_data_template_5
  - name: bin_data_template_6
