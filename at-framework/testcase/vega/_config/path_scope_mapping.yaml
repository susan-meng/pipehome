# 提交路径 → 测试范围映射表（全自动流水线使用）
# 提交监听根据变更路径匹配 path_patterns，得到 scope、tags、suggested_suites
# 执行器根据 scope/tags 调用 get_cases() 按需提取并运行

subsystems:
  # ===== Vega 数据平台核心模块 =====
  - id: vega-data-connection
    name: VEGA数据连接服务
    path_patterns:
      - "vega/data-connection/**"
      - "vega/vega-backend/**/data-connection*"
    scope_tags: [regression, data-connection]
    smoke_tags: [smoke]
    performance_tags: [performance]
    suggested_suites:
      - 测试数据源连接
      - 新增数据源
      - 更新数据源
      - 删除数据源
      - 查询数据源列表
      - 元数据扫描
      - 元数据查询

  - id: vega-mdl-data-model
    name: VEGA数据模型服务
    path_patterns:
      - "vega/mdl-data-model/**"
    scope_tags: [regression, data-model]
    smoke_tags: [smoke]
    suggested_suites:
      - 数据模型CRUD
      - 数据视图管理
      - 事件模型管理
      - 指标模型管理
      - 对象模型管理
      - 血缘分析

  - id: vega-mdl-data-model-job
    name: VEGA数据模型任务服务
    path_patterns:
      - "vega/mdl-data-model-job/**"
    scope_tags: [regression, data-model-job]
    smoke_tags: [smoke]
    suggested_suites:
      - 任务调度
      - 任务执行
      - 任务监控

  - id: vega-uniquery
    name: VEGA统一查询服务
    path_patterns:
      - "vega/mdl-uniquery/**"
    scope_tags: [regression, uniquery]
    smoke_tags: [smoke]
    performance_tags: [performance]
    suggested_suites:
      - DSL查询
      - SQL查询
      - PromQL查询
      - 数据检索
      - 聚合计算

  - id: vega-backend
    name: VEGA后端管理服务
    path_patterns:
      - "vega/vega-backend/**"
    scope_tags: [regression, backend]
    smoke_tags: [smoke]
    suggested_suites:
      - 目录管理
      - 资源管理
      - 发现任务管理
      - 连接器类型管理

  - id: vega-gateway
    name: VEGA API网关
    path_patterns:
      - "vega/vega-gateway/**"
    scope_tags: [regression, gateway]
    smoke_tags: [smoke]
    suggested_suites:
      - 网关路由
      - 认证鉴权
      - 请求转发

  - id: vega-gateway-pro
    name: VEGA高级网关
    path_patterns:
      - "vega/vega-gateway-pro/**"
    scope_tags: [regression, gateway-pro]
    smoke_tags: [smoke]
    suggested_suites:
      - 高级查询
      - 数据获取
      - 连接器管理

  # ===== 其他模块 =====
  - id: ontology
    name: 本体
    path_patterns:
      - "ontology/**"
    scope_tags: [regression, ontology]
    suggested_suites: []

  - id: dataflow
    name: 数据流
    path_patterns:
      - "dataflow/**"
    scope_tags: [regression, dataflow]
    suggested_suites: []

  - id: execution-factory
    name: 执行工厂/算子
    path_patterns:
      - "execution-factory/**"
    scope_tags: [regression, operator]
    suggested_suites: []

  # ===== 特殊 Scope =====
  - id: performance
    name: 性能测试
    path_patterns: []
    scope_tags: [performance]
    suggested_suites: []
    description: "用例或套件 tags 含 performance 时，SCOPE=performance 或 TAGS=performance 可筛出所有性能用例"

  - id: all-vega
    name: 全量Vega测试
    path_patterns:
      - "vega/**"
    scope_tags: [regression, smoke]
    suggested_suites:
      - 冒烟测试
      - 回归测试

change_actions:
  added: "新增文件/API → 智能体自动补充用例"
  modified: "修改 → 智能体检查并更新用例或断言"
  deleted: "删除 → 智能体禁用或删除对应用例"

# 测试类型与 tags 约定
test_type_tags:
  functional: [regression, smoke]
  contract: [regression, contract]
  boundary: [boundary, regression]
  stress: [stress]
  performance: [performance]
